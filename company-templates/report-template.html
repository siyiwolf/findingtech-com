<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{{REPORT_TITLE}}</title>
    <style>
        @page { margin: 3cm 1.5cm; }
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            max-width: 21cm;
            margin: 0 auto;
            padding: 2.5cm 1.5cm 2.5cm 1.5cm;
            line-height: 1.6;
        }
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: white;
            z-index: 1000;
            padding: 0px 1.5cm 0px 1.5cm;
            border-bottom: 2px solid #0057B8;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            height: 50px;
        }
        .header-logo { height: 50px; }
        .footer, .subtitle { display: none; }
        h1 {
            font-size: 24pt;
            color: #0057B8;
            border-bottom: 3px solid #0057B8;
            padding-bottom: 10px;
            margin: 60px 0 30px 0;
            text-align: center;
        }
        .section { margin-bottom: 25px; }
        .section-title {
            font-size: 16pt;
            font-weight: 700;
            color: #0057B8;
            margin-bottom: 15px;
        }
        .stat { font-size: 18pt; font-weight: 700; color: #0057B8; }
        .highlight { color: #0057B8; font-weight: 700; }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #0057B8; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        @media print { .section { page-break-inside: avoid; } }
    </style>
</head>
<body>
    <div class="header">
        <img src="../../../finding-company-vi/logo/finding-logo-primary.png" alt="Finding Company Logo" class="header-logo">
    </div>

    <h1>{{REPORT_TITLE}}</h1>

    <div style="text-align: center; margin: 30px 0 40px 0; font-size: 10pt; color: #666;">
        洞察方向：{{SECTION_NAME}} | 日期：{{REPORT_DATE}}
    </div>

    <!-- 1. 市场机会概述 -->
    <div class="section">
        <div class="section-title">1. 市场机会概述</div>
        <!-- 内容 -->
    </div>

    <!-- 2. 用户画像与核心痛点 -->
    <div class="section">
        <div class="section-title">2. 用户画像与核心痛点</div>
        <!-- 内容 -->
    </div>

    <!-- 3. 竞争格局分析 -->
    <div class="section">
        <div class="section-title">3. 竞争格局分析</div>
        <!-- 内容 -->
    </div>

    <!-- 4. 产品概念与差异化定位 -->
    <div class="section">
        <div class="section-title">4. 产品概念与差异化定位</div>
        <!-- 内容 -->
    </div>

    <!-- 5. GTM策略 -->
    <div class="section">
        <div class="section-title">5. GTM策略</div>
        <!-- 内容 -->
    </div>

    <!-- 6. 实施路线图 -->
    <div class="section">
        <div class="section-title">6. 实施路线图</div>
        <!-- 内容 -->
    </div>

    <!-- 7. 风险评估与应对 -->
    <div class="section">
        <div class="section-title">7. 风险评估与应对</div>
        <!-- 内容 -->
    </div>

    <!-- 8. 数据来源 -->
    <div class="section">
        <div class="section-title">8. 数据来源</div>
        <!-- 内容 -->
    </div>

    <!-- 9. 结论与建议 -->
    <div class="section">
        <div class="section-title">9. 结论与建议</div>
        <!-- 内容 -->
    </div>

    <div class="final-meta" style="position: relative; page-break-before: always; padding: 2.5cm 1.5cm; font-size: 9pt; color: #666; text-align: center; border-top: 1px solid #ddd; margin-top: 2cm;">
        <div style="margin-bottom: 10px; line-height: 1.6;">
            <strong>Report:</strong> {{REPORT_TITLE}} | <strong>Version:</strong> 1.0 | <strong>Classification:</strong> Internal Use Only
        </div>
        <div style="font-size: 8pt; color: #999;">
            © 2026 Finding Company（斐丁科技）. 保留所有权利。本报告仅供内部决策使用，不构成投资建议。
        </div>
    </div>
</body>
</html>
