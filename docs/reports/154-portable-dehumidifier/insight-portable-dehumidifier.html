    <h1>方向 154：户外除湿机 (Portable Dehumidifier) - 市场洞察</h1>

    <h2>1. 市场</h2>
    <ul>
      <li>露营、房车、仓库潮湿易发霉，需要便携除湿</li>
      <li>传统除湿机笨重且需固定电源</li>
    </ul>

    <h2>2. 客群</h2>
    <ul>
      <li>房车车主</li>
      <li>露营者（长期驻场）</li>
      <li>小型仓库、工具房</li>
    </ul>

    <h2>3. KSF</h2>
    <ul>
      <li>半导体制冷（Peltier）或小型压缩机，日除湿量 5-10L</li>
      <li>太阳能供电 + 电池（或车载 12V）</li>
      <li>水箱 2L + 连续排水口</li>
      <li>低噪音（≤ 35dB）</li>
      <li>轻量化（≤ 3kg）</li>
    </ul>

    <h2>4. 定价</h2>
    - 便携除湿机: ¥699
