    <ul>
      <li>庭院、花园需要防止宠物走失或外人闯入，传统围栏无法预警</li>
      <li>智能围栏可检测入侵并发出警报</li>
    </ul>

    <h2>2. 客群</h2>
    <ul>
      <li>有宠物家庭</li>
      <li>花园业主</li>
      <li>农场/小型园区</li>
    </ul>

    <h2>3. KSF</h2>
    <ul>
      <li>红外/振动传感器检测翻越或破坏</li>
      <li>声光报警 + 手机推送</li>
      <li>太阳能供电 + 低功耗设计</li>
      <li>与智能门锁/摄像头联动</li>
      <li>易安装（无需埋线）</li>
    </ul>

    <h2>4. 定价</h2>

    - 扩展包（+10米）: ¥299
