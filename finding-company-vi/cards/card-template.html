<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
body { margin: 0; padding: 0; }
.card {
width: 900px;
height: 540px;
background: linear-gradient(135deg, #0057B8 0%, #4A90E2 100%);
color: white;
font-family: 'Inter', sans-serif;
display: flex;
align-items: center;
padding: 48px;
box-sizing: border-box;
position: relative;
overflow: hidden;
}
.card::before {
content: '';
position: absolute;
top: -50%;
right: -50%;
width: 200px;
height: 200px;
background: rgba(255,255,255,0.1);
border-radius: 50%;
z-index: 1;
}
.logo {
height: 80px;
margin-right: 36px;
filter: brightness(0) invert(1);
position: relative;
z-index: 2;
}
.info {
position: relative;
z-index: 2;
}
.name {
font-size: 52px;
font-weight: 700;
}
.title {
font-size: 26px;
margin-top: 14px;
opacity: 0.9;
}
.company {
font-size: 20px;
margin-top: 24px;
opacity: 0.8;
}
.contact {
font-size: 16px;
margin-top: 32px;
opacity: 0.7;
}
</style>
</head>
<body>
<div class='card'>
<img src='../logo/finding-logo-primary.svg' class='logo' alt='Finding'>
<div class='info'>
<div class='name'>{{NAME}}</div>
<div class='title'>{{TITLE}}</div>
<div class='company'>Finding Company</div>
<div class='contact'>{{EMAIL}}</div>
</div>
</div>
</body>
</html>
