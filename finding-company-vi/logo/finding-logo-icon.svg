<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <!-- 图标版Logo：图形在上，文字在下 -->
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0057B8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A90E2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 图形部分 -->
  <g id="graphic" transform="translate(50, 40)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="url(#iconGradient)" stroke-width="4"/>
    <path d="M 0 -22 L 6 -8 L 0 0 L -6 -8 Z" fill="#0057B8"/>
    <path d="M 0 22 L 6 8 L 0 0 L -6 8 Z" fill="#4A90E2"/>
    <circle cx="0" cy="0" r="4" fill="#0057B8"/>
  </g>

  <!-- 文字部分 -->
  <g id="text" text-anchor="middle" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
    <text x="50" y="95" font-size="12" font-weight="700" fill="#0057B8" letter-spacing="2">FINDING</text>
    <text x="50" y="112" font-size="10" font-weight="600" fill="#003A75" letter-spacing="1">COMPANY</text>
  </g>
</svg>
